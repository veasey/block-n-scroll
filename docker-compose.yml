services:
  db:
    container_name: db
    build:
      context: ./db
      dockerfile: docker/Dockerfile
    ports:
      - "4306:3306"
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: defaultrootpass
      MYSQL_USER: ${DB_USERNAME:-blockuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-blockdb}
    volumes:
      - ./db/sql:/docker-entrypoint-initdb.d/sql      
  web:
    container_name: web
    build:
      context: .
      dockerfile: ./web/docker/Dockerfile
    ports:
      - "8000:80"
    environment:
      DB_HOST: db
      DATABASE_URL: mysql+pymysql://${DB_USERNAME:-blockuser}:${DB_PASSWORD:-secret}@db/${DB_DATABASE:-blockdb}
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./web:/var/www/html
      - vendor-data:/var/www/html/vendor
      - ./.env:/var/www/html/.env # mount .env separately
volumes:
  vendor-data: